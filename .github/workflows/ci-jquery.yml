name: CI jQuery
permissions:
  contents: read

on:
  pull_request:
    branches: [ master, vnext ]
    paths-ignore:
      - 'docs/angular/**'
      - 'docs/xplat/**'
      - 'docs/wpf/**'
      - 'docs/winforms/**'
      - 'docs/aspnet/**'

jobs:
  build-and-verify:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build jQuery
        run: npm run jquery:build
