name: Clear expired sidebar labels

# Runs on a weekly schedule and can also be triggered manually.

on:
  schedule:
    - cron: '0 9 * * 2'   # Every Tuesday at 09:00 UTC
  workflow_dispatch:        # Manual trigger from the GitHub Actions UI

permissions:
  contents: write
  pull-requests: write

jobs:
  clear-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release-labels script
        run: node scripts/release-labels.mjs

      - name: Open PR if toc files changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: clear expired sidebar labels"
          title: "chore: clear expired sidebar labels"
          body: |
            Auto-generated by `scripts/release-labels.mjs`.

            Cleared `new` / `updated` / `preview` labels from toc items whose
            package version is 2+ minor releases behind the current published version.

            **Versions checked:**
            | Platform | Package | Registry |
            |---|---|---|
            | Angular | `igniteui-angular` | npm |
            | React | `igniteui-react` | npm |
            | WebComponents | `igniteui-webcomponents` | npm |
            | Blazor | `IgniteUI.Blazor.Trial` | nuget.org |

            Review the diff and merge when ready.
          branch: auto/clear-expired-labels
          delete-branch: true
          labels: "chore,toc"
