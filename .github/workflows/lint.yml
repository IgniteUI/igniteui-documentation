name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches: [master, vnext]
    paths:
      - 'docs/**/*.mdx'
      - 'docs/**/*.md'
      - '.markdownlint.json'
      - 'cspell.json'
      - 'scripts/check-llms-metadata.mjs'
      - 'package.json'

jobs:
  llms-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate llms.txt metadata
        run: npm run check:llms-metadata

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Get changed markdown files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'docs/**/*.mdx' 'docs/**/*.md' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Found changed files: $FILES"

      - name: Markdownlint (changed files)
        if: steps.changed.outputs.files != ''
        run: npx markdownlint ${{ steps.changed.outputs.files }}

      - name: Summary
        if: always() && steps.changed.outputs.files != ''
        run: |
          echo "## Markdownlint Results" >> "$GITHUB_STEP_SUMMARY"
          RESULT=$(npx markdownlint ${{ steps.changed.outputs.files }} 2>&1 || true)
          ERRORS=$(echo "$RESULT" | grep -c "MD[0-9]" || echo "0")
          FILES_WITH_ERRORS=$(echo "$RESULT" | grep "MD[0-9]" | cut -d: -f1 | sort -u | wc -l || echo "0")
          echo "**$ERRORS errors** in **$FILES_WITH_ERRORS files**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$ERRORS" -gt 0 ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$RESULT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Get changed markdown files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'docs/**/*.mdx' 'docs/**/*.md' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: CSpell (changed files)
        if: steps.changed.outputs.files != ''
        run: npx cspell --no-progress ${{ steps.changed.outputs.files }}

      - name: Summary
        if: always() && steps.changed.outputs.files != ''
        run: |
          echo "## CSpell Results" >> "$GITHUB_STEP_SUMMARY"
          RESULT=$(npx cspell --no-progress ${{ steps.changed.outputs.files }} 2>&1 || true)
          ERRORS=$(echo "$RESULT" | grep -c "Unknown word" || echo "0")
          FILES_WITH_ERRORS=$(echo "$RESULT" | grep "Unknown word" | cut -d: -f1 | sort -u | wc -l || echo "0")
          echo "**$ERRORS errors** in **$FILES_WITH_ERRORS files**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$ERRORS" -gt 0 ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$RESULT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  check-relative-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      # Sync xplat-generated Angular content into docs/angular/src/content
      # before scanning so the angular tree is complete (same as the angular build).
      - name: Sync xplat → angular (en)
        run: npm run sync:generated-from-xplat --prefix docs/angular

      - name: Sync xplat → angular (jp)
        run: npm run sync:generated-from-xplat:jp --prefix docs/angular

      - name: Generate angular content (en)
        run: npm run generate:en --prefix docs/angular

      - name: Generate angular content (jp)
        run: npm run generate:jp --prefix docs/angular

      # Expand xplat _shared/ templates into docs/xplat/generated/ for all
      # non-Angular platforms so the generated grid pages are present when
      # the xplat link check runs (Angular is already generated by the sync step).
      - name: Generate xplat content (en)
        run: |
          npm run generate:react --prefix docs/xplat
          npm run generate:webcomponents --prefix docs/xplat
          npm run generate:blazor --prefix docs/xplat

      - name: Generate xplat content (jp)
        run: |
          npm run generate:react:jp --prefix docs/xplat
          npm run generate:webcomponents:jp --prefix docs/xplat
          npm run generate:blazor:jp --prefix docs/xplat

      - name: Check relative links
        shell: bash
        run: |
          set -o pipefail

          EXIT=0
          echo '## Relative Link Check' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          node scripts/check-relative-links.mjs --platform=xplat 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || EXIT=1
          node scripts/check-relative-links.mjs --platform=angular 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || EXIT=1

          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT
