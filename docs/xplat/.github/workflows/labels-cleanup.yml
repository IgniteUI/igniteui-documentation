name: Replace c- labels with case label

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC

jobs:
  cleanup-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      
    steps:
      - name: Replace c- labels with case label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get all open issues
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            
            console.log(`Found ${issues.length} open issues`);
            
            let processedCount = 0;
            
            for (const issue of issues) {
              // Skip pull requests
              if (issue.pull_request) continue;
              
              // Find labels starting with "c-"
              const cLabels = issue.labels.filter(label => 
                typeof label === 'string' 
                  ? label.startsWith('c-') 
                  : label.name.startsWith('c-')
              );
              
              if (cLabels.length > 0) {
                console.log(`Issue #${issue.number}: Found ${cLabels.length} label(s) starting with c-`);
                
                // Get label names
                const cLabelNames = cLabels.map(label => 
                  typeof label === 'string' ? label : label.name
                );
                
                // Get current labels that don't start with 'c-'
                const remainingLabels = issue.labels
                  .filter(label => {
                    const name = typeof label === 'string' ? label : label.name;
                    return !name.startsWith('c-');
                  })
                  .map(label => typeof label === 'string' ? label : label.name);
                
                // Add 'case' label if not already present
                if (!remainingLabels.includes('case')) {
                  remainingLabels.push('case');
                }
                
                // Update labels
                await github.rest.issues.setLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: remainingLabels
                });
                
                console.log(`Issue #${issue.number}: Removed [${cLabelNames.join(', ')}], added 'case'`);
                processedCount++;
              }
            }
            
            console.log(`\nProcessed ${processedCount} issue(s) with c- labels`);
